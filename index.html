<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔹 Basic SEO -->
    <title>T-HOSPITALITY GROUP | Bangkok’s Nightlife Collective</title>
    <meta
      name="description"
      content="Experience Bangkok’s vibrant nightlife with T-HOSPITALITY GROUP — featuring THAY, TDERM, GOT, REC, and XIM."
    />
    <link rel="canonical" href="https://t-hospitality.com" />
    <meta name="theme-color" content="#000000" />

    <!-- 🔹 Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "T-HOSPITALITY GROUP",
        "url": "https://t-hospitality.com",
        "logo": "https://t-hospitality.com/t-hospitality.png",
        "sameAs": [
          "https://www.instagram.com/thaybkk",
          "https://www.instagram.com/tdermbkk",
          "https://www.instagram.com/gotbkk",
          "https://www.instagram.com/recbkk",
          "https://www.instagram.com/ximbkk"
        ]
      }
    </script>

    <!-- 🔹 Open Graph / Facebook / LINE preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://t-hospitality.com" />
    <meta property="og:site_name" content="T-HOSPITALITY GROUP" />
    <meta property="og:title" content="T-HOSPITALITY GROUP | Bangkok’s Nightlife Collective" />
    <meta
      property="og:description"
      content="Discover THAY, TDERM, GOT, REC, and XIM — five iconic nightlife venues in Bangkok."
    />
    <meta property="og:image" content="https://t-hospitality.com/t-hospitality.png" />
    <meta property="og:image:secure_url" content="https://t-hospitality.com/t-hospitality.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- 🔹 Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="T-HOSPITALITY GROUP | Bangkok’s Nightlife Collective" />
    <meta
      name="twitter:description"
      content="Discover THAY, TDERM, GOT, REC, and XIM — five iconic nightlife venues in Bangkok."
    />
    <meta name="twitter:image" content="https://t-hospitality.com/t-hospitality.png" />

    <!-- Anuphan (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Clash Display & Clash Grotesk (Fontshare) -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=clash-grotesk@400,500,600,700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons / PWA -->
    <link rel="icon" type="image/png" sizes="32x32" href="/t-hospitality.png" />
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
